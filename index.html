<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Basic Bug</title>

<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Audiowide',sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200') center center/cover no-repeat;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
}

.profile{
    display:flex;
    justify-content:center;
    margin-top:10px;
}

.profile span{
    padding:10px 20px;
    border-radius:50px;
    color:white;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2);
}

.logo{
    width:110px;
    height:110px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:45px;
    margin:25px auto;
}

.title{
    text-align:center;
    color:white;
    font-size:40px;
    text-shadow:0 0 15px rgba(255,255,255,.5);
}

.subtitle{
    text-align:center;
    color:white;
    margin:15px 0 25px;
}

.card{
    margin-bottom:20px;
    padding:20px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
}

.card h3{
    color:white;
    margin-bottom:15px;
}

input,select{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    color:white;
}

option{
    color:black;
}

.sender{
    display:flex;
    gap:10px;
}

.sender button{
    flex:1;
    padding:25px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
}

.sender button.active{
    border:2px solid white;
}

.send{
    width:100%;
    padding:20px;
    border:none;
    border-radius:20px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
    background:white;
}

.bottom{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.box{
    width:31%;
    text-align:center;
    padding:15px;
    border-radius:18px;
    color:white;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
}
</style>
</head>
<body>

<div class="container">

    <div class="profile">
        <span>👑 Zal | FOUNDER</span>
    </div>

    <div class="logo">⚡</div>

    <h1 class="title">BASIC BUG</h1>

    <p class="subtitle">⚡ Vexel Wraith</p>

    <div class="card">
        <h3>🎯 Target Number</h3>
        <input type="text" placeholder="+62812345678">
    </div>

    <div class="card">
        <h3>🐞 Select Bug</h3>

        <select>
            <option>DELAY ANDROID</option>
            <option>DELAY IOS</option>
            <option>FREEZE DEVICE</option>
        </select>
    </div>

    <div class="card">
        <h3>📨 Sender Type</h3>

        <div class="sender">
            <button>🌐 Global</button>
            <button class="active">🛡️ Private</button>
        </div>
    </div>

    <button class="send">
        ✈ SEND
    </button>

    <div class="bottom">
        <div class="box">⚡<br>Fast</div>
        <div class="box">🛡️<br>Simple</div>
        <div class="box">📈<br>Reliable</div>
    </div>

</div>

</body>
</html>
