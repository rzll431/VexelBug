<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Bug UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.profile{
    text-align:center;
    margin-bottom:20px;
}

.profile span{
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    color:white;
    padding:10px 18px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,.2);
}

.logo{
    width:100px;
    height:100px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:20px auto;
    font-size:40px;
}

.title{
    text-align:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:20px;
    margin-bottom:20px;
    color:white;
}

.card h3{
    margin-bottom:15px;
}

.input,
select{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:16px;
}

.input::placeholder{
    color:#ddd;
}

.sender-box{
    display:flex;
    gap:10px;
}

.sender{
    flex:1;
    padding:25px;
    border-radius:18px;
    text-align:center;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:white;
    cursor:pointer;
}

.sender.active{
    border:2px solid white;
}

.send-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    background:white;
    color:black;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.menu{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.menu div{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:18px;
    padding:15px;
    width:90px;
    text-align:center;
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <span>👑 Zal | FOUNDER</span>
    </div>

    <div class="logo">⚡</div>

    <div class="title">BASIC BUG</div>
    <div class="subtitle">⚡ Vexel Wraith</div>

    <div class="card">
        <h3>🎯 Target Number</h3>
        <input class="input" type="text" placeholder="+62812345678">
    </div>

    <div class="card">
        <h3>🐞 Select Bug</h3>
        <select>
            <option>DELAY ANDROID</option>
            <option>CRASH IOS</option>
            <option>FREEZE DEVICE</option>
        </select>
    </div>

    <div class="card">
        <h3>📨 Sender Type</h3>

        <div class="sender-box">
            <div class="sender">
                🌐<br><br>
                Global
            </div>

            <div class="sender active">
                🛡️<br><br>
                Private
            </div>
        </div>
    </div>

    <button class="send-btn">
        ✈ SEND ATTACK
    </button>

    <div class="menu">
        <div>⚡<br>Fast</div>
        <div>🛡️<br>Simple</div>
        <div>📈<br>Reliable</div>
    </div>

</div>

</body>
</html>
